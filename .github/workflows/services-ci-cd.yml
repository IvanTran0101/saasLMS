name: Services CI/CD

on:
  pull_request:
    paths:
      - "apps/**"
      - "gateways/**"
      - "services/**"
      - "shared/**"
      - "etc/docker/swarm/stack.yml"
      - "deploy/ansible/**"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "gateways/**"
      - "services/**"
      - "shared/**"
      - "etc/docker/swarm/stack.yml"
      - "deploy/ansible/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Optional single service to process (blank = detect from git diff)"
        required: false
        default: ""

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          selected_service="${{ github.event.inputs.service || '' }}"
          declare -A touched=()

          add_service() {
            local svc="$1"
            touched["$svc"]=1
          }

          if [[ -n "$selected_service" ]]; then
            add_service "$selected_service"
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
                base="$(git rev-parse "${head}^" 2>/dev/null || true)"
              fi
            fi

            if [[ -z "${base:-}" ]]; then
              echo "Unable to determine diff base; defaulting to no changed services."
              changed_files=""
            else
              changed_files="$(git diff --name-only "$base" "$head" || true)"
            fi

            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              case "$f" in
                apps/blazor/*) add_service blazor ;;
                shared/saasLMS.DbMigrator/*) add_service dbmigrator ;;
                apps/auth-server/*) add_service authserver ;;
                gateways/web/*) add_service gateway ;;
                services/saas/*) add_service saasservice ;;
                services/administration/*) add_service administrationservice ;;
                services/identity/*) add_service identityservice ;;
                services/product/*) add_service productservice ;;
                services/courseCatalog/*) add_service coursecatalogservice ;;
                services/enrollment/*) add_service enrollmentservice ;;
                services/assessment/*) add_service assessmentservice ;;
                services/learningProgress/*) add_service learningprogressservice ;;
                services/notification/*) add_service notificationservice ;;
                services/reporting/*) add_service reportingservice ;;
              esac
            done <<< "$changed_files"
          fi

          matrix='[]'
          for svc in "${!touched[@]}"; do
            case "$svc" in
              blazor)
                obj='{"service":"blazor","service_dir":"apps/blazor","csproj":"apps/blazor/src/saasLMS.Blazor/saasLMS.Blazor.csproj","image_repo":"youngmizh/saaslms-blazor","image_var":"BLAZOR_IMAGE","dockerfile":"apps/blazor/src/saasLMS.Blazor/Dockerfile"}'
                ;;
              dbmigrator)
                obj='{"service":"dbmigrator","service_dir":"shared/saasLMS.DbMigrator","csproj":"shared/saasLMS.DbMigrator/saasLMS.DbMigrator.csproj","image_repo":"youngmizh/saaslms-dbmigrator","image_var":"DBMIGRATOR_IMAGE","dockerfile":"shared/saasLMS.DbMigrator/Dockerfile"}'
                ;;
              authserver)
                obj='{"service":"authserver","service_dir":"apps/auth-server","csproj":"apps/auth-server/src/saasLMS.AuthServer/saasLMS.AuthServer.csproj","image_repo":"youngmizh/saaslms-authserver","image_var":"AUTHSERVER_IMAGE","dockerfile":"apps/auth-server/src/saasLMS.AuthServer/Dockerfile"}'
                ;;
              gateway)
                obj='{"service":"gateway","service_dir":"gateways/web","csproj":"gateways/web/src/saasLMS.WebGateway/saasLMS.WebGateway.csproj","image_repo":"youngmizh/saaslms-gateway-web","image_var":"GATEWAY_IMAGE","dockerfile":"gateways/web/src/saasLMS.WebGateway/Dockerfile"}'
                ;;
              saasservice)
                obj='{"service":"saasservice","service_dir":"services/saas","csproj":"services/saas/src/saasLMS.SaasService.HttpApi.Host/saasLMS.SaasService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-saas","image_var":"SAAS_IMAGE","dockerfile":"services/saas/src/saasLMS.SaasService.HttpApi.Host/Dockerfile"}'
                ;;
              administrationservice)
                obj='{"service":"administrationservice","service_dir":"services/administration","csproj":"services/administration/src/saasLMS.AdministrationService.HttpApi.Host/saasLMS.AdministrationService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-administration","image_var":"ADMINISTRATION_IMAGE","dockerfile":"services/administration/src/saasLMS.AdministrationService.HttpApi.Host/Dockerfile"}'
                ;;
              identityservice)
                obj='{"service":"identityservice","service_dir":"services/identity","csproj":"services/identity/src/saasLMS.IdentityService.HttpApi.Host/saasLMS.IdentityService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-identity","image_var":"IDENTITY_IMAGE","dockerfile":"services/identity/src/saasLMS.IdentityService.HttpApi.Host/Dockerfile"}'
                ;;
              productservice)
                obj='{"service":"productservice","service_dir":"services/product","csproj":"services/product/src/saasLMS.ProductService.HttpApi.Host/saasLMS.ProductService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-product","image_var":"PRODUCT_IMAGE","dockerfile":"services/product/src/saasLMS.ProductService.HttpApi.Host/Dockerfile"}'
                ;;
              coursecatalogservice)
                obj='{"service":"coursecatalogservice","service_dir":"services/courseCatalog","csproj":"services/courseCatalog/src/saasLMS.CourseCatalogService.HttpApi.Host/saasLMS.CourseCatalogService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-coursecatalog","image_var":"COURSECATALOG_IMAGE","dockerfile":"services/courseCatalog/src/saasLMS.CourseCatalogService.HttpApi.Host/Dockerfile"}'
                ;;
              enrollmentservice)
                obj='{"service":"enrollmentservice","service_dir":"services/enrollment","csproj":"services/enrollment/src/saasLMS.EnrollmentService.HttpApi.Host/saasLMS.EnrollmentService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-enrollment","image_var":"ENROLLMENT_IMAGE","dockerfile":"services/enrollment/src/saasLMS.EnrollmentService.HttpApi.Host/Dockerfile"}'
                ;;
              assessmentservice)
                obj='{"service":"assessmentservice","service_dir":"services/assessment","csproj":"services/assessment/src/saasLMS.AssessmentService.HttpApi.Host/saasLMS.AssessmentService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-assessment","image_var":"ASSESSMENT_IMAGE","dockerfile":"services/assessment/src/saasLMS.AssessmentService.HttpApi.Host/Dockerfile"}'
                ;;
              learningprogressservice)
                obj='{"service":"learningprogressservice","service_dir":"services/learningProgress","csproj":"services/learningProgress/src/saasLMS.LearningProgressService.HttpApi.Host/saasLMS.LearningProgressService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-learningprogress","image_var":"LEARNINGPROGRESS_IMAGE","dockerfile":"services/learningProgress/src/saasLMS.LearningProgressService.HttpApi.Host/Dockerfile"}'
                ;;
              notificationservice)
                obj='{"service":"notificationservice","service_dir":"services/notification","csproj":"services/notification/src/saasLMS.NotificationService.HttpApi.Host/saasLMS.NotificationService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-notification","image_var":"NOTIFICATION_IMAGE","dockerfile":"services/notification/src/saasLMS.NotificationService.HttpApi.Host/Dockerfile"}'
                ;;
              reportingservice)
                obj='{"service":"reportingservice","service_dir":"services/reporting","csproj":"services/reporting/src/saasLMS.ReportingService.HttpApi.Host/saasLMS.ReportingService.HttpApi.Host.csproj","image_repo":"youngmizh/saaslms-reporting","image_var":"REPORTING_IMAGE","dockerfile":"services/reporting/src/saasLMS.ReportingService.HttpApi.Host/Dockerfile"}'
                ;;
              *)
                echo "Unknown service: $svc" >&2
                continue
                ;;
            esac
            matrix="$(jq --argjson obj "$obj" '. + [$obj]' <<< "$matrix")"
          done

          if [[ "$(jq 'length' <<< "$matrix")" -gt 0 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix=[]' >> "$GITHUB_OUTPUT"
          fi

  ci-quality:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK with NuGet cache
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.props
            **/*.targets
            NuGet.Config

      - name: Restore service project
        run: dotnet restore "${{ matrix.csproj }}"

      - name: Build service project (Release)
        run: dotnet build "${{ matrix.csproj }}" -c Release --no-restore

      - name: Code style gate (dotnet format verify)
        run: dotnet format "${{ matrix.csproj }}" --verify-no-changes --no-restore --verbosity minimal

      - name: Run service unit tests (Application/Domain when available)
        shell: bash
        run: |
          set -euo pipefail
          test_root="${{ matrix.service_dir }}/test"
          if [[ ! -d "$test_root" ]]; then
            echo "No test directory for ${{ matrix.service }}; skipping tests."
            exit 0
          fi

          mapfile -t test_projects < <(find "$test_root" -type f \( -name "*.Application.Tests.csproj" -o -name "*.Domain.Tests.csproj" \) | sort)
          if [[ "${#test_projects[@]}" -eq 0 ]]; then
            echo "No Application/Domain test projects for ${{ matrix.service }}; skipping tests."
            exit 0
          fi

          for proj in "${test_projects[@]}"; do
            echo "Running tests: $proj"
            dotnet test "$proj" -c Release --nologo --logger "trx;LogFileName=$(basename "$proj").trx"
          done

  security-scan:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  build-images:
    needs: [detect-changes, ci-quality, security-scan]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ matrix.image_repo }}:sha-${{ github.sha }}

  update-image-tags:
    needs: [detect-changes, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SAASLMS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible boto3 botocore
          ansible-galaxy collection install -r deploy/ansible/requirements.yml

      - name: Update service image tag on manager
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i deploy/ansible/inventories/prod/hosts.ini \
            deploy/ansible/playbooks/swarm-set-image-tag.yml \
            -e "service_image_var=${{ matrix.image_var }}" \
            -e "service_image_value=${{ matrix.image_repo }}:sha-${{ github.sha }}"

  deploy-stack:
    needs: update-image-tags
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SAASLMS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible boto3 botocore
          ansible-galaxy collection install -r deploy/ansible/requirements.yml

      - name: Deploy stack
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i deploy/ansible/inventories/prod/hosts.ini \
            deploy/ansible/playbooks/swarm-stack.yml
