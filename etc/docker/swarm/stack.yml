version: "3.9"

x-env-common: &env_common
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
  ASPNETCORE_URLS: http://+:80
  AllowedHosts: "*"
  App__CorsOrigins: https://app.trananhminh.uk,https://api.trananhminh.uk,https://auth.trananhminh.uk
  App__RedirectAllowedUrls: https://app.trananhminh.uk,https://api.trananhminh.uk,https://auth.trananhminh.uk
  AuthServer__Authority: https://auth.trananhminh.uk
  AuthServer__MetadataAddress: https://auth.trananhminh.uk/.well-known/openid-configuration
  AuthServer__RequireHttpsMetadata: "true"
  AuthServer__SwaggerClientId: WebGateway_Swagger
  Redis__Configuration: ${Redis__Configuration}
  RabbitMQ__Connections__Default__HostName: ${RabbitMQ__Connections__Default__HostName}
  RabbitMQ__Connections__Default__Port: ${RabbitMQ__Connections__Default__Port}
  RabbitMQ__EventBus__ExchangeName: ${RabbitMQ__EventBus__ExchangeName}
  ElasticSearch__Url: ${ElasticSearch__Url}
  # Internal service-to-service calls go via the gateway (no TLS).
  # In this stack, the stack-prefixed Swarm service names are the stable DNS names
  # visible to peer containers.
  RemoteServices__Default__BaseUrl: http://saaslms_gateway:80
  IdentityClients__Default__Authority: https://auth.trananhminh.uk
  IdentityClients__Default__RequireHttps: "true"

x-deploy-worker: &deploy_worker
  replicas: 1
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 10
    window: 60s
  placement:
    constraints:
      - node.role == worker

x-deploy-manager: &deploy_manager
  replicas: 1
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 10
    window: 60s
  placement:
    constraints:
      - node.role == manager

networks:
  saaslms-app:
    driver: overlay
    attachable: true

secrets:
  abplicensecode:
    name: ${ABPLICENSECODE_SECRET_NAME}
    external: true
  stringencryption_defaultpassphrase:
    name: ${STRINGENCRYPTION_DEFAULTPASSPHRASE_SECRET_NAME}
    external: true
  identityclients_default_clientsecret:
    name: ${IDENTITYCLIENTS_DEFAULT_CLIENTSECRET_SECRET_NAME}
    external: true
  connectionstrings_administrationservice:
    name: ${CONNECTIONSTRINGS_ADMINISTRATIONSERVICE_SECRET_NAME}
    external: true
  connectionstrings_assessmentservice:
    name: ${CONNECTIONSTRINGS_ASSESSMENTSERVICE_SECRET_NAME}
    external: true
  connectionstrings_coursecatalogservice:
    name: ${CONNECTIONSTRINGS_COURSECATALOGSERVICE_SECRET_NAME}
    external: true
  connectionstrings_enrollmentservice:
    name: ${CONNECTIONSTRINGS_ENROLLMENTSERVICE_SECRET_NAME}
    external: true
  connectionstrings_forms:
    name: ${CONNECTIONSTRINGS_FORMS_SECRET_NAME}
    external: true
  connectionstrings_identityservice:
    name: ${CONNECTIONSTRINGS_IDENTITYSERVICE_SECRET_NAME}
    external: true
  connectionstrings_learningprogressservice:
    name: ${CONNECTIONSTRINGS_LEARNINGPROGRESSSERVICE_SECRET_NAME}
    external: true
  connectionstrings_notificationservice:
    name: ${CONNECTIONSTRINGS_NOTIFICATIONSERVICE_SECRET_NAME}
    external: true
  connectionstrings_productservice:
    name: ${CONNECTIONSTRINGS_PRODUCTSERVICE_SECRET_NAME}
    external: true
  connectionstrings_reportingservice:
    name: ${CONNECTIONSTRINGS_REPORTINGSERVICE_SECRET_NAME}
    external: true
  connectionstrings_saasservice:
    name: ${CONNECTIONSTRINGS_SAASSERVICE_SECRET_NAME}
    external: true

configs:
  # Swarm configs are used for settings keys that cannot be reliably passed via env vars
  # because they contain '-' (e.g. RemoteServices:course-catalog:*).
  assessment_appsettings_production:
    name: ${ASSESSMENT_APPSETTINGS_CONFIG_NAME}
    file: ./appsettings/assessment.appsettings.Production.json
  enrollment_appsettings_production:
    name: ${ENROLLMENT_APPSETTINGS_CONFIG_NAME}
    file: ./appsettings/enrollment.appsettings.Production.json

services:
  blazor:
    # NOTE: Pin this to a concrete tag when troubleshooting frontend boot issues
    # (e.g. missing /_framework/blazor.boot.json).
    image: ${BLAZOR_IMAGE}
    ports:
      - target: 80
        published: 8083
        protocol: tcp
        mode: host
    environment:
      <<: *env_common
      App__SelfUrl: https://app.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_Blazor
      # The container image currently doesn't ship `/app/wwwroot/libs`.
      # ABP checks this folder by default and returns HTTP 500 if missing.
      AbpMvcLibsOptions__CheckLibs: "false"
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_manager

  dbmigrator:
    image: ${DBMIGRATOR_IMAGE}
    environment:
      <<: *env_common
      # IMPORTANT: keep RootUrl without a trailing slash to avoid seeding redirect URIs like
      # "https://app.trananhminh.uk//authentication/login-callback" (double slash), which then
      # fails OpenIddict redirect_uri validation and results in /Error?httpStatusCode=400.
      OpenIddict__Applications__AuthServer__RootUrl: https://auth.trananhminh.uk
      OpenIddict__Applications__Web__RootUrl: https://api.trananhminh.uk
      OpenIddict__Applications__WebGateway__RootUrl: https://api.trananhminh.uk
      OpenIddict__Applications__Blazor__RootUrl: https://app.trananhminh.uk
      OpenIddict__Applications__BlazorWebApp__RootUrl: https://app.trananhminh.uk
      OpenIddict__Applications__BlazorServer__RootUrl: https://api.trananhminh.uk
      DbMigrator__Redis__Configuration: ${DbMigrator__Redis__Configuration}
      DbMigrator__ElasticSearch__Url: ${DbMigrator__ElasticSearch__Url}
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_administrationservice
      - connectionstrings_assessmentservice
      - connectionstrings_coursecatalogservice
      - connectionstrings_enrollmentservice
      - connectionstrings_forms
      - connectionstrings_identityservice
      - connectionstrings_learningprogressservice
      - connectionstrings_notificationservice
      - connectionstrings_productservice
      - connectionstrings_reportingservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_manager

  authserver:
    image: ${AUTHSERVER_IMAGE}
    ports:
      - target: 80
        published: 8082
        protocol: tcp
        mode: host
    environment:
      <<: *env_common
      App__SelfUrl: https://auth.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_AuthServer
      OpenIddict__Applications__Blazor__RootUrl: https://app.trananhminh.uk
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_identityservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_manager

  gateway:
    image: ${GATEWAY_IMAGE}
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: host
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_WebGateway
      # Override localhost dev destinations from yarp.json to internal service DNS names.
      ReverseProxy__Clusters__AuthServer__Destinations__AuthServer__Address: http://saaslms_authserver:80/
      ReverseProxy__Clusters__Administration__Destinations__Administration__Address: http://saaslms_administrationservice:80/
      ReverseProxy__Clusters__Identity__Destinations__Identity__Address: http://saaslms_identityservice:80/
      ReverseProxy__Clusters__Saas__Destinations__Saas__Address: http://saaslms_saasservice:80/
      ReverseProxy__Clusters__Product__Destinations__Product__Address: http://saaslms_productservice:80/
      ReverseProxy__Clusters__CourseCatalog__Destinations__CourseCatalog__Address: http://saaslms_coursecatalogservice:80/
      ReverseProxy__Clusters__Enrollment__Destinations__Enrollment__Address: http://saaslms_enrollmentservice:80/
      ReverseProxy__Clusters__Assessment__Destinations__Assessment__Address: http://saaslms_assessmentservice:80/
      ReverseProxy__Clusters__LearningProgress__Destinations__LearningProgress__Address: http://saaslms_learningprogressservice:80/
      ReverseProxy__Clusters__Notification__Destinations__Notification__Address: http://saaslms_notificationservice:80/
      ReverseProxy__Clusters__Reporting__Destinations__Reporting__Address: http://saaslms_reportingservice:80/
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_manager

  saasservice:
    image: ${SAAS_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_SaasService
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_saasservice
      - connectionstrings_administrationservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  administrationservice:
    image: ${ADMINISTRATION_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_AdministrationService
      RemoteServices__AbpIdentity__BaseUrl: http://saaslms_gateway:80/
      RemoteServices__AbpIdentity__UseCurrentAccessToken: "false"
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  identityservice:
    image: ${IDENTITY_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_IdentityService
      # Prevent OpenIddict seeding from crashing due to missing RootUrl keys.
      OpenIddict__Applications__Blazor__RootUrl: https://app.trananhminh.uk
      OpenIddict__Applications__BlazorWebApp__RootUrl: https://app.trananhminh.uk
      OpenIddict__Applications__BlazorServer__RootUrl: https://api.trananhminh.uk
      OpenIddict__Applications__PublicWeb__RootUrl: https://api.trananhminh.uk
      OpenIddict__Applications__WebGateway__RootUrl: https://api.trananhminh.uk
      OpenIddict__Applications__PublicWebGateway__RootUrl: https://api.trananhminh.uk
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_identityservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  productservice:
    image: ${PRODUCT_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_ProductService
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_productservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  coursecatalogservice:
    image: ${COURSECATALOG_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_CourseCatalogService
      # Use EC2 instance profile credentials (IMDS) via the AWS SDK default credential chain.
      # ABP's AwsBlobProvider uses:
      # - UseCredentials=true + empty ProfileName => AmazonS3Client(region) (no explicit creds) => IMDS works.
      # - ProfileName set => tries to load from shared credentials file and may throw "Not found aws credentials".
      CourseCatalogService__Aws__UseCredentials: "true"
      CourseCatalogService__Aws__ProfileName: ""
      CourseCatalogService__Aws__ProfilesLocation: ""
      CourseCatalogService__Aws__Region: ap-southeast-1
      CourseCatalogService__Aws__ContainerName: lms-course-mat-dev-213325653412-ap-southeast-1-an
      CourseCatalogService__Aws__CreateContainerIfNotExists: "false"
      # Service-to-service calls must point directly to the target service.
      # ABP's dynamic proxy needs `{BaseUrl}/api/abp/api-definition`, which the gateway doesn't expose per-service.
      RemoteServices__EnrollmentService__BaseUrl: http://saaslms_enrollmentservice:80
      RemoteServices__EnrollmentService__UseCurrentAccessToken: "false"
      RemoteServices__EnrollmentService__IdentityClient: Default
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_coursecatalogservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  enrollmentservice:
    image: ${ENROLLMENT_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_EnrollmentService
    configs:
      - source: enrollment_appsettings_production
        target: /app/appsettings.Production.json
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_enrollmentservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  assessmentservice:
    image: ${ASSESSMENT_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_AssessmentService
      # Use EC2 instance profile credentials (IMDS) via the AWS SDK default credential chain.
      # When UseCredentials=false, ABP's AwsBlobProvider expects explicit AccessKeyId/SecretAccessKey.
      AssessmentService__Aws__UseCredentials: "true"
      AssessmentService__Aws__ProfileName: ""
      AssessmentService__Aws__ProfilesLocation: ""
      AssessmentService__Aws__Region: ap-southeast-1
      AssessmentService__Aws__ContainerName: lms-assess-sub-dev-213325653412-ap-southeast-1-an
      AssessmentService__Aws__CreateContainerIfNotExists: "false"
    configs:
      - source: assessment_appsettings_production
        target: /app/appsettings.Production.json
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_assessmentservice
      - connectionstrings_forms
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  learningprogressservice:
    image: ${LEARNINGPROGRESS_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_LearningProgressService
      # Service-to-service calls must point directly to the target service.
      # ABP's dynamic proxy needs `{BaseUrl}/api/abp/api-definition`, which the gateway doesn't expose per-service.
      RemoteServices__EnrollmentService__BaseUrl: http://saaslms_enrollmentservice:80
      RemoteServices__EnrollmentService__UseCurrentAccessToken: "false"
      RemoteServices__EnrollmentService__IdentityClient: Default
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_learningprogressservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  notificationservice:
    image: ${NOTIFICATION_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_NotificationService
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_notificationservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker

  reportingservice:
    image: ${REPORTING_IMAGE}
    environment:
      <<: *env_common
      App__SelfUrl: https://api.trananhminh.uk
      RabbitMQ__EventBus__ClientName: saasLMS_ReportingService
    secrets:
      - abplicensecode
      - stringencryption_defaultpassphrase
      - identityclients_default_clientsecret
      - connectionstrings_reportingservice
      - connectionstrings_administrationservice
      - connectionstrings_saasservice
    networks:
      - saaslms-app
    deploy:
      <<: *deploy_worker
