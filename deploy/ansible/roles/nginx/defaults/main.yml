---
nginx_sites_available_dir: /etc/nginx/sites-available
nginx_sites_enabled_dir: /etc/nginx/sites-enabled
nginx_config_dir: /etc/nginx/conf.d
nginx_config_name: saaslms.conf

nginx_public_app_domain: app.trananhminh.uk
nginx_public_api_domain: api.trananhminh.uk
nginx_public_auth_domain: auth.trananhminh.uk
nginx_public_grafana_domain: grafana.trananhminh.uk
nginx_public_prometheus_domain: prometheus.trananhminh.uk

nginx_app_upstream_url: http://127.0.0.1:8083
nginx_api_upstream_url: http://127.0.0.1:8080
nginx_auth_upstream_url: http://127.0.0.1:8082
# Default upstreams for observability are intentionally localhost placeholders.
# Production inventory should override these with infra private IP based values.
nginx_grafana_upstream_url: http://127.0.0.1:3000
nginx_prometheus_upstream_url: http://127.0.0.1:9090

# Proxy and upload settings
nginx_client_max_body_size: 100m
nginx_proxy_connect_timeout: 60s
nginx_proxy_send_timeout: 300s
nginx_proxy_read_timeout: 300s

# TLS hardening (applied when Let's Encrypt cert is present for a domain)
nginx_ssl_protocols: "TLSv1.2 TLSv1.3"
nginx_ssl_ciphers: "HIGH:!aNULL:!MD5"
nginx_ssl_prefer_server_ciphers: "off"
nginx_ssl_session_timeout: "1d"
nginx_ssl_session_cache: "shared:SSL:10m"
nginx_ssl_session_tickets: "off"

# Security headers
nginx_security_headers_enabled: true
nginx_hsts_max_age: 31536000

# Let's Encrypt / Certbot automation
nginx_https_automation_enabled: true
nginx_letsencrypt_email: "ops@trananhminh.uk"
nginx_letsencrypt_staging: false
