---
- name: Ensure Ansible remote tmp directory exists and is writable
  ansible.builtin.file:
    path: /tmp/.ansible/tmp
    state: directory
    mode: '1777'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - awscli
      - unzip
      - software-properties-common
      - apt-transport-https
    state: present

- name: Read current server timezone
  ansible.builtin.command:
    cmd: timedatectl show --property=Timezone --value
  register: common_current_timezone
  changed_when: false

- name: Set server timezone
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ timezone }}"
  when: common_current_timezone.stdout | trim != timezone
  changed_when: common_current_timezone.stdout | trim != timezone
